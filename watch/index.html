<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CGTube</title>

<link rel="icon"
      type="image/png"
      href="../images/chickenguntube_weblogo.png">

<style>

:root{
    --bg:#0f0f0f;
    --panel:#0f0f0f;
    --card:#181818;
    --hover:#272727;
    --text:#f1f1f1;
    --sub:#aaaaaa;
    --border:#303030;
}

body.light{
    --bg:#ffffff;
    --panel:#ffffff;
    --card:#F0F0F0;
    --hover:#f2f2f2;
    --text:#111111;
    --sub:#606060;
    --border:#dddddd;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,Helvetica,sans-serif;
    overflow-x:hidden;
}

.main{
    margin-left:72px;
    min-height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:72px;
    height:100vh;
    background:var(--panel);
    border-right:1px solid var(--border);

    display:flex;
    flex-direction:column;
    align-items:center;

    z-index:100;
}

.sidebar-logo{
    width:100%;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;
}

.sidebar-logo img{
    width:48px;
    height:48px;
    object-fit:contain;
}

.nav-btn{

    width:64px;
    height:74px;

    border:none;
    outline:none;

    background:none;
    color:var(--text);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:6px;

    border-radius:12px;

    cursor:pointer;

    transition:.15s;
}

.nav-btn:hover{
    background:var(--hover);
}

.nav-btn svg{

    width:24px;
    height:24px;

    fill:none;
    stroke:currentColor;

    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;

}

.nav-btn span{
    font-size:10px;
}

/* =========================
   TOPBAR
========================= */

.topbar{

    position:sticky;
    top:0;

    height:56px;

    background:var(--bg);

    border-bottom:1px solid var(--border);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 16px;

    z-index:50;

}

.brand{

    display:flex;
    align-items:center;

    cursor:pointer;

}

.brand img{

    height:54px;
    object-fit:contain;

}

/* =========================
   SEARCH
========================= */

.search{

    width:50%;
    max-width:650px;

    display:flex;
    align-items:center;

    border:1px solid var(--border);
    border-radius:999px;

    overflow:hidden;

    background:var(--bg);

}

.search input{

    flex:1;

    height:40px;

    border:none;
    outline:none;

    background:transparent;

    color:var(--text);

    padding:0 14px;

    font-size:15px;

}

.search button{

    width:60px;
    height:40px;

    border:none;

    border-left:1px solid var(--border);

    background:var(--card);

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

}

.search button svg{

    width:20px;
    height:20px;

    fill:none;
    stroke:var(--text);

    stroke-width:2;

}

/* =========================
   CONTENT
========================= */

.content{
    padding:20px;
}

/* =========================
   PLAYER
========================= */

.player-layout{

    display:grid;

    grid-template-columns:1fr 360px;

    gap:24px;

    align-items:start;

}

.player-box{

    width:100%;

    aspect-ratio:16/9;

    background:#000;

    border-radius:14px;

    overflow:hidden;

}

.player-box.short{

    max-width:430px;

    aspect-ratio:9/16;

}

.player-box iframe{

    width:100%;
    height:100%;

    border:none;

}

/* =========================
   VIDEO INFO
========================= */

.video-info{

    margin-top:14px;

}

.video-info h2{

    font-size:22px;

    line-height:1.4;

}

/* =========================
   CHANNEL
========================= */

.channel-box{

    display:flex;

    align-items:center;

    gap:10px;

    margin-top:12px;

}

.channel-box img{

    width:36px;
    height:36px;

    border-radius:50%;

    object-fit:cover;

    background:var(--card);

    cursor:pointer;

}

.channel-box h3{

    font-size:14px;

    color:var(--text);

    cursor:pointer;

}

.channel-box p{

    margin-top:4px;

    font-size:12px;

    color:var(--sub);

}
.channel-box,
.channel-box *{
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
}

/* =========================
   RECOMMENDED
========================= */

.recommended{

    display:flex;

    flex-direction:column;

    gap:14px;

}

.rec-card{

    display:flex;

    gap:10px;

    cursor:pointer;

}

.rec-thumb{

    width:168px;

    aspect-ratio:16/9;

    border-radius:10px;

    background-size:cover;
    background-position:center;

    flex-shrink:0;

}

.rec-info h4{

    font-size:14px;

    line-height:1.4;

}

.rec-info p{

    margin-top:4px;

    font-size:12px;

    color:var(--sub);

}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1000px){

.player-layout{

    grid-template-columns:1fr;

}

}

</style>

</head>

<body>

    <div class="sidebar">

    <div class="sidebar-logo">
        <img src="../images/chickenguntube_weblogo.png" alt="CGTube">
    </div>

    <button class="nav-btn"
      onclick="location.href='/CGTube/'">

      <svg viewBox="0 0 24 24">
      <path d="M3 10L12 3L21 10"></path>
      <path d="M5 9V20H19V9"></path>
      </svg>

      <span>Inicio</span>

      </button>
          

    <button class="nav-btn" onclick="toggleSettings()">

        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 2V5"></path>
            <path d="M12 19V22"></path>
            <path d="M2 12H5"></path>
            <path d="M19 12H22"></path>
        </svg>

        <span>Ajustes</span>

    </button>

</div>

<div class="main">

    <div class="topbar">

        <div class="brand"
             onclick="location.href='/CGTube/'">

            <img src="../images/chickentube_logo.png"
                 alt="CGTube">

        </div>

        <div class="search">

            <input
                id="searchInput"
                type="text"
                placeholder="Buscar">

            <button id="searchButton">

                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M20 20L17 17"></path>
                </svg>

            </button>

        </div>

    </div>

    <div class="content">

        <div class="player-layout">

            <!-- VIDEO -->

            <div>

                <div
                    class="player-box"
                    id="playerBox">

                    <iframe
                        id="player"
                        allowfullscreen
                        allow="autoplay">
                    </iframe>

                </div>

                <div class="video-info">

                    <h2 id="videoTitle">

                        Cargando...

                    </h2>

                    <div class="channel-box">

                        <img
                            id="channelIcon"
                            src="https://i.postimg.cc/1XkYCRr5/56-sin-titulo-20260628220556.png">

                        <div>

                            <h3 id="videoChannel">

                                Canal

                            </h3>

                            <p>

                                Suscribirse

                            </p>

                        </div>

                    </div>

                </div>

            </div>

            <!-- RECOMENDADOS -->

            <div
                class="recommended"
                id="recommended">

            </div>

        </div>

    </div>

</div>

<script src="../CGTubeLinks.js"></script>
<script src="../CGTubeChannels.js"></script>

<script>

    /* ==========================
   CGTube Player
========================== */

const savedTheme = localStorage.getItem("CGTubeTheme");

if (savedTheme === "light") {
    document.body.classList.add("light");
}

/* ==========================
   DATA
========================== */

const params = new URLSearchParams(window.location.search);

const videoId = params.get("v");

const videos = window.CGTubeLinks || [];

const channels = window.CGTubeChannels || [];

/* ==========================
   ELEMENTS
========================== */

const player = document.getElementById("player");

const playerBox = document.getElementById("playerBox");

const videoTitle = document.getElementById("videoTitle");

const videoChannel = document.getElementById("videoChannel");

const channelIcon = document.getElementById("channelIcon");

const recommended = document.getElementById("recommended");

/* ==========================
   HELPERS
========================== */

function extractVideoId(url){

    if(!url) return "";

    if(url.includes("youtu.be/")){

        return url
            .split("youtu.be/")[1]
            .split("?")[0];

    }

    if(url.includes("watch?v=")){

        return url
            .split("watch?v=")[1]
            .split("&")[0];

    }

    return url;

}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];

    }

    return array;

}

function getVideo(id){

    return videos.find(v=>
        extractVideoId(v.url)===id
    );

}

function getChannel(id){

    return channels.find(c=>
        String(c.id).trim()===String(id).trim()
    );

}

function getChannelByName(name){

    if(!name) return null;

    return channels.find(c=>

        c.name &&
        c.name.toLowerCase()===name.toLowerCase()

    );

}

/* ==========================
   LOAD VIDEO
========================== */

const currentVideo = getVideo(videoId);

if(currentVideo){

    player.src =
`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;

    document.title =
`${currentVideo.title} - CGTube`;

    videoTitle.textContent =
currentVideo.title;

            }

    /* ==========================
   CHANNEL
========================== */

let currentChannel = null;

/* Buscar primero por channelId */

if (currentVideo?.channelId) {

    currentChannel = getChannel(currentVideo.channelId);

}

/* Si no existe, intentar por nombre */

if (!currentChannel && currentVideo?.channel) {

    currentChannel = getChannelByName(currentVideo.channel);

}

/* Aplicar datos del canal */

if (currentChannel) {

    videoChannel.textContent =
        currentChannel.name || "Canal";

    channelIcon.src =
        currentChannel.icon ||
        "https://i.postimg.cc/1XkYCRr5/56-sin-titulo-20260628220556.png";

    const goChannel = () => {

        if (currentChannel.url) {

            location.href = currentChannel.url;

        }

    };

    document.querySelector(".channel-box").onclick = goChannel;

}
else{

    videoChannel.textContent = "Canal desconocido";

    channelIcon.src =
        "https://i.postimg.cc/1XkYCRr5/56-sin-titulo-20260628220556.png";

}

/* ==========================
   SHORTS
========================== */

if (currentVideo?.short === true ||
    currentVideo?.type === "short") {

    playerBox.classList.add("short");

}
else{

    playerBox.classList.remove("short");

}

    /* ==========================
   RECOMMENDED VIDEOS
========================== */

function loadRecommended() {

    recommended.innerHTML = "";

    let list = videos.filter(video => {

        return extractVideoId(video.url) !== videoId;

    });

    shuffle(list);

    list.slice(0, 8).forEach(video => {

        const id = extractVideoId(video.url);

        let channel = null;

        if (video.channelId) {

            channel = getChannel(video.channelId);

        }

        if (!channel && video.channel) {

            channel = getChannelByName(video.channel);

        }

        const card = document.createElement("div");
        card.className = "rec-card";

        card.onclick = () => {

            location.href = "?v=" + id;

        };

        const thumb = document.createElement("div");
        thumb.className = "rec-thumb";

        thumb.style.backgroundImage =
            `url(https://img.youtube.com/vi/${id}/hqdefault.jpg)`;

        const info = document.createElement("div");
        info.className = "rec-info";

        const title = document.createElement("h4");
        title.textContent = video.title || "Sin título";

        const channelName = document.createElement("p");
        channelName.textContent =
            channel?.name || "Canal desconocido";

        info.appendChild(title);
        info.appendChild(channelName);

        card.appendChild(thumb);
        card.appendChild(info);

        recommended.appendChild(card);

    });

}

/* Cargar recomendados */

loadRecommended();

    /* ==========================
   SEARCH
========================== */

const searchInput = document.getElementById("searchInput");
const searchButton = document.getElementById("searchButton");

function doSearch(){

    const query = searchInput.value
        .trim()
        .toLowerCase();

    if(!query) return;

    const result = videos.find(video =>

        (video.title || "")
            .toLowerCase()
            .includes(query)

    );

    if(result){

        location.href =
            "?v=" + extractVideoId(result.url);

    }

}

searchButton?.addEventListener("click", doSearch);

searchInput?.addEventListener("keydown", e => {

    if(e.key === "Enter"){

        doSearch();

    }

});

/* ==========================
   THEME
========================== */

function toggleTheme(){

    document.body.classList.toggle("light");

    localStorage.setItem(
        "CGTubeTheme",
        document.body.classList.contains("light")
            ? "light"
            : "dark"
    );

}

/* ==========================
   HOME
========================== */

function showHome(){

    location.href = "/ChickenGunTube/";

}

/* ==========================
   SETTINGS
========================== */

function toggleSettings(){

    // Puedes reemplazar esto
    // por tu menú de ajustes.

    toggleTheme();

}

</script>

</body>

</html>
