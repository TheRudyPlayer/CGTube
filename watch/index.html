<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTube</title>
    <link rel="icon" type="image/png" href="../images/chickenguntube_weblogo.png">

    <style>

:root{
    --bg:#0f0f0f;
    --panel:#0f0f0f;
    --card:#181818;
    --hover:#272727;
    --text:#f1f1f1;
    --sub:#aaaaaa;
    --border:#303030;
}

body.light{
    --bg:#ffffff;
    --panel:#ffffff;
    --card:#F0F0F0;
    --hover:#f2f2f2;
    --text:#111111;
    --sub:#606060;
    --border:#dddddd;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

.main{
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:72px;
    height:100vh;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:100;
}

.sidebar-logo{
    width:100%;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.sidebar-logo img{
    width:48px;
    height:48px;
    object-fit:contain;
}

.nav-btn{
    width:64px;
    height:74px;
    border:none;
    background:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    border-radius:12px;
    cursor:pointer;
    transition:.15s;
}

.nav-btn:hover{
    background:var(--hover);
}

.nav-btn svg{
    width:24px;
    height:24px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
}

.nav-btn span{
    font-size:10px;
}

.main{
    margin-left:72px;
    min-height:100vh;
}

/* TOPBAR */

.topbar{
    position:sticky;
    top:0;
    height:56px;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    z-index:50;
}

.brand{
    display:flex;
    align-items:center;
}

.brand img{
    height:54px;
    object-fit:contain;
}

/* SEARCH */

.search{
    width:50%;
    max-width:650px;
    display:flex;
    align-items:center;
    border:1px solid var(--border);
    border-radius:999px;
    overflow:hidden;
    background:var(--bg);
}

.search input{
    flex:1;
    height:40px;
    border:none;
    outline:none;
    background:transparent;
    color:var(--text);
    padding:0 14px;
    font-size:15px;
}

.search button{
    width:60px;
    height:40px;
    border:none;
    border-left:1px solid var(--border);
    background:var(--card);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.search button svg{
    width:20px;
    height:20px;
    stroke:var(--text);
    fill:none;
    stroke-width:2;
}

/* CONTENT */

.content{
    padding:20px;
}

/* PLAYER */

.player-layout{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:24px;
    padding:20px;
    align-items:start;
}

.player-box{
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:14px;
    overflow:hidden;
}

.player-box.short{
    max-width:430px;
    aspect-ratio:9/16;
}

.player-box iframe{
    width:100%;
    height:100%;
    border:none;
}

@media(max-width:1000px){

.player-layout{
    grid-template-columns:1fr;
}

}

/* INFO DEL VIDEO */

.video-info{
    margin-top:14px;
}

.video-info h2{
    font-size:22px;
    line-height:1.4;
}

/* CANAL */

.channel-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:12px;
}

.channel-box img{
    width:36px;
    height:36px;
    border-radius:50%;
    object-fit:cover;
    background:var(--card);
    cursor:pointer;
}

.channel-box h3{
    font-size:14px;
    color:var(--text);
    cursor:pointer;
}

.channel-box p{
    margin-top:4px;
    font-size:12px;
    color:var(--sub);
}

/* RECOMMENDED */

.recommended{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.rec-card{
    display:flex;
    gap:10px;
    cursor:pointer;
}

.rec-thumb{
    width:168px;
    aspect-ratio:16/9;
    border-radius:10px;
    background-size:cover;
    background-position:center;
    flex-shrink:0;
}

.rec-info h4{
    font-size:14px;
    line-height:1.4;
}

.rec-info p{
    margin-top:4px;
    font-size:12px;
    color:var(--sub);
}
        
    </style>
    
</head>

<body>

    <div class="sidebar">

<div class="sidebar-logo">
<img src="../images/chickenguntube_weblogo.png">
</div>

<button class="nav-btn" onclick="showHome()">

<svg viewBox="0 0 24 24">
<path d="M3 10L12 3L21 10"></path>
<path d="M5 9V20H19V9"></path>
</svg>

<span>Inicio</span>

</button>

<button class="nav-btn" onclick="toggleSettings()">

<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"></circle>
<path d="M12 2V5"></path>
<path d="M12 19V22"></path>
<path d="M2 12H5"></path>
<path d="M19 12H22"></path>
</svg>

<span>Ajustes</span>

</button>

    </div>

    <div class="main">

    <div class="topbar">

    <div class="brand" onclick="location.href='/ChickenGunTube/'" style="cursor:pointer;">
        <img src="../images/chickentube_logo.png">
    </div>

    <div class="search">

        <input
            type="text"
            placeholder="Buscar">

        <button>

            <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M20 20L17 17"></path>
            </svg>

        </button>

    </div>

    </div>

    <div class="content">

    <div class="player-layout">

        <div>

            <div class="player-box" id="playerBox">

                <iframe
                    id="player"
                    allowfullscreen
                    allow="autoplay">
                </iframe>

            </div>

<div class="video-info">

    <h2 id="videoTitle">
        Cargando...
    </h2>

    <div class="channel-box">

        <img
            id="channelIcon"
            src="https://i.postimg.cc/1XkYCRr5/56-sin-titulo-20260628220556.png">

        <div>

            <h3 id="videoChannel">
                Canal
            </h3>

            <p>Suscribirse</p>

        </div>

    </div>

</div>
            
        </div>

<div class="recommended" id="recommended">

</div>
        
    </div>

    </div>

    </div>

    <script src="../CGTubeLinks.js"></script>
    <script src="../LinkChannel.js"></script>

    <script>

        const savedTheme = localStorage.getItem("CGTubeTheme");

if(savedTheme === "light"){
    document.body.classList.add("light");
}
        

        const params = new URLSearchParams(window.location.search);

const videoId = params.get("v");

        const video = (window.CGTubeLinks || []).find(v => {

    if (v.url.includes(videoId)) return true;

    return false;

});

        if (videoId) {

    document.getElementById("player").src =
        `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;

        if (video) {

    document.getElementById("videoTitle").textContent = video.title;

    document.title = `${video.title} - CGTube`;

            }

            const channel = (window.CGTubeChannels || []).find(
    c => c.id === video.channelId
);

if (channel) {

    document.getElementById("videoChannel").onclick = () => {
        location.href = `/ChickenGunTube/channel/?id=${channel.id}`;
    };

    document.getElementById("channelIcon").onclick = () => {
        location.href = `/ChickenGunTube/channel/?id=${channel.id}`;
    };

}

/* RECOMMENDED */

const recommended = document.getElementById("recommended");

const list = (window.CGTubeLinks || [])
    .filter(v => v.url.includes(current) === false);

shuffleArray(list);

list.slice(0, 8).forEach(item => {

    const id = item.url.includes("youtu.be/")
        ? item.url.split("youtu.be/")[1].split("?")[0]
        : item.url.split("watch?v=")[1].split("&")[0];

    const ch = (window.CGTubeChannels || []).find(
        c => c.id === item.channelId
    );

    recommended.innerHTML += `
        <div class="rec-card"
             onclick="location.href='?v=${id}'">

            <div class="rec-thumb"
                 style="background-image:url('https://img.youtube.com/vi/${id}/hqdefault.jpg')">
            </div>

            <div class="rec-info">
                <h4>${item.title}</h4>
                <p>${ch ? ch.name : ""}</p>
            </div>

        </div>
    `;
});

        }

        /* THEME */

function toggleTheme(){

    document.body.classList.toggle("light");

    localStorage.setItem(
        "CGTubeTheme",
        document.body.classList.contains("light")
        ? "light"
        : "dark"
    );

}

    </script>

</body>

</html>
