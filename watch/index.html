<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGTube</title>

<link rel="icon" href="../images/chickenguntube_weblogo.png">

<style>

:root{
    --bg:#0f0f0f;
    --panel:#0f0f0f;
    --card:#181818;
    --hover:#272727;
    --text:#f1f1f1;
    --sub:#aaa;
    --border:#303030;
}

body.light{
    --bg:#fff;
    --panel:#fff;
    --card:#f1f1f1;
    --hover:#e8e8e8;
    --text:#111;
    --sub:#666;
    --border:#ddd;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:72px;
    height:100vh;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.sidebar-logo img{
    width:42px;
    margin:10px 0;
}

.nav-btn{
    width:64px;
    height:70px;
    background:none;
    border:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.nav-btn:hover{
    background:var(--hover);
}

.nav-btn svg{
    width:22px;
    height:22px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
}

/* MAIN */
.main{
    margin-left:72px;
}

/* TOPBAR */
.topbar{
    height:56px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
}

/* SEARCH REAL (SVG LUPA ORIGINAL) */
.search{
    width:50%;
    display:flex;
    border:1px solid var(--border);
    border-radius:999px;
    overflow:hidden;
}

.search input{
    flex:1;
    border:none;
    outline:none;
    padding:10px;
    background:transparent;
    color:var(--text);
}

.search button{
    width:60px;
    border:none;
    background:var(--card);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* LAYOUT */
.layout{
    display:grid;
    grid-template-columns:1fr 360px;
    gap:20px;
    padding:20px;
}

@media(max-width:900px){
    .layout{grid-template-columns:1fr;}
}

/* PLAYER */
.player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
    border-radius:12px;
    overflow:hidden;
}

.player iframe{
    width:100%;
    height:100%;
    border:none;
}

/* INFO */
.info{
    margin-top:12px;
}

.channel{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.channel img{
    width:36px;
    height:36px;
    border-radius:50%;
}

/* RECOMMENDED */
.rec{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.card{
    display:flex;
    gap:10px;
    cursor:pointer;
}

.thumb{
    width:160px;
    aspect-ratio:16/9;
    background-size:cover;
    border-radius:8px;
}

.card h4{
    font-size:14px;
}

.card p{
    font-size:12px;
    color:var(--sub);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-logo">
    <img src="../images/chickenguntube_weblogo.png">
</div>

<button class="nav-btn">
<svg viewBox="0 0 24 24"><path d="M3 10L12 3l9 7"></path><path d="M5 9v12h14V9"></path></svg>
</button>

<button class="nav-btn">
<svg viewBox="0 0 24 24"><path d="M8 5l8 7-8 7V5z"></path></svg>
</button>

<button class="nav-btn" onclick="toggleTheme()">
<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle></svg>
</button>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">

<div>CGTube</div>

<div class="search">
<input id="searchInput" placeholder="Buscar">

<button onclick="searchVideo()">
<svg viewBox="0 0 24 24">
<circle cx="11" cy="11" r="7"></circle>
<path d="M20 20l-3-3"></path>
</svg>
</button>

</div>

</div>

<!-- CONTENT -->
<div class="layout">

<!-- LEFT -->
<div>

<div class="player">
<iframe id="player"></iframe>
</div>

<div class="info">
<h2 id="title">Cargando...</h2>

<div class="channel">
<img id="icon">
<div id="channel">Canal</div>
</div>
</div>

</div>

<!-- RIGHT -->
<div class="rec" id="rec"></div>

</div>
</div>

<script src="../CGTubeLinks.js"></script>
<script src="../LinkChannel.js"></script>

<script>

const params = new URLSearchParams(location.search);
const id = params.get("v");

const links = window.CGTubeLinks || [];
const channels = window.CGTubeChannels || [];

const video = links.find(v => v.url?.includes(id));

/* PLAYER */
if(id){
    document.getElementById("player").src =
    `https://www.youtube.com/embed/${id}?autoplay=1`;

    if(video){
        document.getElementById("title").textContent = video.title;
        document.title = video.title;
    }
}

/* CHANNEL FIX */
let channel = null;

if(video?.channelId){
    channel = channels.find(c => c.id == video.channelId);
}

if(!channel && video?.title){
    const t = video.title.toLowerCase();
    channel = channels.find(c =>
        c?.name && t.includes(c.name.toLowerCase())
    );
}

document.getElementById("channel").textContent =
channel?.name || "Canal desconocido";

document.getElementById("icon").src =
channel?.icon || "https://i.postimg.cc/1XkYCRr5/56-sin-titulo-20260628220556.png";

/* 🔥 RECOMMENDED SYSTEM REAL */
const rec = document.getElementById("rec");

function getId(url){
    if(!url) return "";
    if(url.includes("youtu.be/"))
        return url.split("youtu.be/")[1].split("?")[0];

    if(url.includes("watch?v="))
        return url.split("watch?v=")[1].split("&")[0];

    return "";
}

const list = links
.filter(v => v.url !== video?.url)
.sort(()=>Math.random()-0.5)
.slice(0,8);

rec.innerHTML = list.map(v => {

const vid = getId(v.url);
const ch = channels.find(c => c.id == v.channelId);

return `
<div class="card" onclick="location.href='?v=${vid}'">

<div class="thumb"
style="background-image:url('https://img.youtube.com/vi/${vid}/hqdefault.jpg')">
</div>

<div>
<h4>${v.title || "Sin título"}</h4>
<p>${ch?.name || "Canal desconocido"}</p>
</div>

</div>
`;
}).join("");

/* SEARCH */
function searchVideo(){
const q = document.getElementById("searchInput").value.toLowerCase();

const found = links.find(v =>
v.title?.toLowerCase().includes(q)
);

if(found){
const vid = getId(found.url);
location.href = "?v=" + vid;
}
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("CGTubeTheme",
document.body.classList.contains("light")?"light":"dark");
}

</script>

</body>
</html>
