<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CGTube</title>

<link rel="icon" href="../images/chickenguntube_weblogo.png">

<style>

:root{
    --bg:#0f0f0f;
    --text:#fff;
    --sub:#aaa;
    --border:#303030;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:72px;
    height:100vh;
    background:var(--bg);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:100;
}

.sidebar-logo{
    width:100%;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.sidebar-logo img{
    width:48px;
    height:48px;
}

.nav-btn{
    width:64px;
    height:74px;
    border:none;
    background:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    border-radius:12px;
    cursor:pointer;
}

.nav-btn:hover{
    background:#272727;
}

.nav-btn svg{
    width:24px;
    height:24px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
}

.nav-btn span{
    font-size:10px;
}

.main{
    margin-left:72px;
}

.banner{
    width:100%;
    height:220px;
    background:#222;
}

.banner img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.channel-info{
    max-width:1200px;
    margin:auto;
    display:flex;
    gap:24px;
    padding:20px;
}

.channel-icon{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
}

.channel-text h1{
    margin:0;
    font-size:34px;
}

.channel-text p{
    color:var(--sub);
}

.tabs{
    max-width:1200px;
    margin:auto;
    display:flex;
    gap:30px;
    padding:0 20px;
    border-bottom:1px solid var(--border);
}

.tab{
    padding:16px 0;
    cursor:pointer;
}

.videos{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="sidebar-logo" onclick="history.back()">
    <img src="../images/chickenguntube_weblogo.png">
</div>

<button class="nav-btn"
onclick="location.href='/ChickenGunTube/'">

<svg viewBox="0 0 24 24">
<path d="M3 10L12 3L21 10"></path>
<path d="M5 9V20H19V9"></path>
</svg>

<span>Inicio</span>

</button>

<button class="nav-btn"
onclick="history.back()">

<svg viewBox="0 0 24 24">
<path d="M15 18L9 12L15 6"></path>
</svg>

<span>Volver</span>

</button>

</div>

<div class="main">

<div class="banner">
    <img id="banner">
</div>

<div class="channel-info">

<img
id="icon"
class="channel-icon">

<div class="channel-text">

<h1 id="name">
Canal
</h1>

<p id="handle">
@canal
</p>

</div>

</div>

<div class="tabs">

<div class="tab">
Videos
</div>

<div class="tab">
Shorts
</div>

</div>

<div
id="videos"
class="videos">

</div>

<script src="../LinkChannel.js"></script>
<script src="../LinkVideo.js"></script>

<script>

// Aquí empezará el sistema

</script>

</div>
</body>
</html>
