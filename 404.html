<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - CGTube</title>

<style>

:root{
    --bg:#0f0f0f;
    --card:#0f0f0f;
    --hover:#272727;
    --text:#f1f1f1;
    --sub:#aaaaaa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.wrapper{
    width:100%;
    max-width:850px;
}

.error-code{
    font-size:clamp(60px,14vw,110px);
    margin-bottom:20px;
}

.container{
    background:var(--card);
    border-radius:22px;
    padding:40px;
    display:flex;
    align-items:center;
    gap:40px;
}

.logo{
    flex-shrink:0;
}

.logo img{
    width:clamp(80px,18vw,150px);
}

.text{
    flex:1;
}

.text h2{
    font-size:clamp(22px,4vw,30px);
}

.text p{
    font-size:clamp(14px,2vw,16px);
}

.buttons{
    margin-top:28px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button{
    background:var(--hover);
    color:var(--text);
    border:none;
    border-radius:999px;
    padding:12px 22px;
    font-size:15px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    filter:brightness(1.15);
}

@media(max-width:700px){

.container{
    flex-direction:column;
    text-align:center;
}

.buttons{
    justify-content:center;
}

button{
    width:100%;
}

}

</style>
</head>
<body>

<div class="wrapper">

<div class="error-code">
404
</div>

<div class="container">

<div class="logo">
<img src="./images/chickentube_logo.png" alt="CGTube">
</div>

<div class="text">

<h2>Esta página no está disponible</h2>

<p>
El video o la página que intentas abrir no existe, fue eliminada o la dirección es incorrecta.
</p>

<div class="buttons">

<button onclick="location.href='/'">
Ir al inicio
</button>

<button onclick="history.back()">
Volver
</button>

<button onclick="location.reload()">
Reintentar
</button>

</div>

</div>

</div>

</div>

</body>
</html>
